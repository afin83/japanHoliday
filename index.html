<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b2545" />
  <meta name="description" content="Japan 2028 — family trip itinerary, map-first." />
  <title>Japan 2028 — Family Trip</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <link rel="preconnect" href="https://cartodb-basemaps-a.global.ssl.fastly.net" crossorigin />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <!-- Map is the home screen / anchor -->
  <div id="map" aria-label="Map of the Japan 2028 trip route"></div>

  <!-- Top trip-summary strip -->
  <header class="trip-strip" id="tripStrip">
    <div class="trip-strip__snow" aria-hidden="true"></div>
    <div class="trip-strip__inner">
      <h1 class="trip-strip__title" id="tripTitle">Japan 2028</h1>
      <div class="map-mode" id="mapMode" role="group" aria-label="Map detail">
        <button class="is-active" data-map-mode="route" type="button" aria-pressed="true">Route</button>
        <button data-map-mode="day" type="button" aria-pressed="false">Day</button>
      </div>
    </div>
  </header>

  <!-- Route view: jump straight to a location (same as tapping its map pin) -->
  <div class="route-picker" id="routePicker" role="group" aria-label="Jump to a location" hidden></div>

  <section class="day-view" id="dayView" aria-label="Day map controls" hidden>
    <div class="day-picker" id="dayPicker" aria-label="Choose a day"></div>
    <button class="day-step-nav day-step-nav--prev" id="dayStepPrev" type="button" aria-label="Previous itinerary step">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button class="day-step-nav day-step-nav--next" id="dayStepNext" type="button" aria-label="Next itinerary step">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M8.59 16.59 10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
    </button>
    <article class="day-brief" id="dayBrief"></article>
  </section>

  <!-- Recenter button -->
  <button class="map-btn map-btn--recenter" id="recenterBtn" type="button" aria-label="Recentre the map on the whole trip">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm8.94 3a8.994 8.994 0 0 0-7.94-7.94V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06ZM12 19a7 7 0 1 1 0-14 7 7 0 0 1 0 14Z"/></svg>
  </button>

  <!-- Bottom sheet host (location + leg detail) -->
  <div class="scrim" id="scrim" hidden></div>
  <section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle" hidden>
    <div class="sheet__grabber" id="sheetGrabber" aria-hidden="true"><span></span></div>
    <div class="sheet__head">
      <div class="sheet__eyebrow" id="sheetEyebrow"></div>
      <h2 class="sheet__title" id="sheetTitle"></h2>
      <button class="sheet__close" id="sheetClose" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.29 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
      </button>
    </div>
    <div class="sheet__body" id="sheetBody"></div>
  </section>

  <!-- Bottom navigation (map stays the anchor) -->
  <nav class="tabbar" id="tabbar" aria-label="Primary">
    <button class="tabbar__btn is-active" data-view="map" type="button" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="m15 5.1 6-2v15.8l-6 2-6-2-6 2V4.9l6-2 6 2Zm-1 1.62-4-1.34v11.9l4 1.34V6.72Zm2 11.9 4-1.34V5.28l-4 1.34v11.9ZM8 5.38 5 6.38v11.9l3-1V5.38Z"/></svg>
      <span>Map</span>
    </button>
    <button class="tabbar__btn" data-view="budget" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4Zm1 15h-2v-1.5H9v-2h4a.5.5 0 0 0 0-1h-2a2.5 2.5 0 0 1 0-5V0h2v1.5h2v2h-4a.5.5 0 0 0 0 1h2a2.5 2.5 0 0 1 0 5V16Z"/></svg>
      <span>Budget</span>
    </button>
    <button class="tabbar__btn" data-view="itinerary" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10a2 2 0 0 1 2 2v16l-7-3-7 3V5a2 2 0 0 1 2-2Zm0 15 5-2.14L17 18V5H7v13Zm2-9h6v2H9V9Zm0 4h4v2H9v-2Z"/></svg>
      <span>Itinerary</span>
    </button>
    <button class="tabbar__btn" data-view="bookings" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm2 16H8v-2h8v2Zm0-4H8v-2h8v2Zm-3-5V3.5L18.5 9H13Z"/></svg>
      <span>Bookings</span>
    </button>
  </nav>

  <!-- Full-screen panel host (budget / itinerary / bookings) -->
  <section class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle" hidden>
    <header class="panel__head">
      <h2 class="panel__title" id="panelTitle"></h2>
      <button class="panel__close" id="panelClose" type="button" aria-label="Back to map">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.29 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
      </button>
    </header>
    <div class="panel__body" id="panelBody"></div>
  </section>

  <!-- Data + app scripts (globals, no build step) -->
  <script src="data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/format.js"></script>
  <script src="js/map.js"></script>
  <script src="js/route-nav.js"></script>
  <script src="js/rail-geometry.js"></script>
  <script src="js/day-view.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
